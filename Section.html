<script> function AddToFav(imageSrc, button) { let favourites = JSON.parse(localStorage.getItem("favourites")) || []; if (!favourites.includes(imageSrc)) { favourites.push(imageSrc); localStorage.setItem( "favourites", JSON.stringify(favourites) ); button.innerText = "❤︎ Added"; } } </script>

     <div id="navbar"></div>
    <script>
        fetch("navbar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;

            const toggleBtn = document.querySelector('.toggle_btn');
            const dropDownMenu = document.querySelector('.dropdown_menu');
            const toggleBtnIcon = document.querySelector('.toggle_btn i');

            toggleBtn.addEventListener("click", () => {
                dropDownMenu.classList.toggle("open");

                const isOpen = dropDownMenu.classList.contains("open");

                toggleBtnIcon.className = isOpen
                    ? "fa-solid fa-xmark"
                    : "fa-solid fa-bars";
            });
        });
    </script>

    <script>
        document.querySelectorAll(".gallery-item img").forEach(img=>{

        const original = img.src;
        const hover = img.dataset.hover;

        if(!hover) return;

        img.addEventListener("mouseenter",()=>{

            img.src = hover;
        });

        img.addEventListener("mouseleave", ()=>{

            img.src = original;
        });

        });
    </script>
    <script>
        function openModal(type) {
            document.getElementById("modal").style.display = "block";

            if (type === "login") {
                document.getElementById("loginForm").style.display = "block";
                document.getElementById("registerForm").style.display = "none";
            } else {
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("registerForm").style.display = "block";
            }
        }
        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }
        function login() {
            alert("Signed in");
        }
        function register() {
            alert("Register");
        }
    </script>
    <div id="modal" class="modal">
        <div class="modal-box">
            <span class="close" onclick="closeModal()">&times;</span>

            <div id="loginForm">
                <h2>Login</h2>
                <input type="text" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()" class="main-btn">Sign in</button>
            </div>

            <div id="registerForm">
                <h2>Register</h2>
                <input type="text" placeholder="Name">
                <input type="email" id="registerEmail" placeholder="Email">
                <input type="password" id="registerPassword" placeholder="Password">
                <button onclick="register()" class="main-btn">Create Account</button>
            </div>

        </div>
